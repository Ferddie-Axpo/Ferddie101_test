<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Calculator</title>
    <script>
        function calculate() {
            let input = document.getElementById('input').value;
            let result;
            try {
                result = eval(input);
            } catch (e) {
                result = 'Error';
            }
            document.getElementById('result').innerText = result;
        }

        function squareRoot() {
            let num = parseFloat(document.getElementById('input').value);
            document.getElementById('result').innerText = Math.sqrt(num);
        }

        function percentage() {
            let num = parseFloat(document.getElementById('input').value);
            document.getElementById('result').innerText = num / 100;
        }

        function power() {
            let base = parseFloat(document.getElementById('input').value.split(' ')[0]);
            let exp = parseFloat(document.getElementById('input').value.split(' ')[1]);
            document.getElementById('result').innerText = Math.pow(base, exp);
        }

        function factorial(n) {
            return n ? n * factorial(n - 1) : 1;
        }

        function calculateFactorial() {
            let num = parseInt(document.getElementById('input').value);
            document.getElementById('result').innerText = factorial(num);
        }
    </script>
</head>
<body>
    <h1>Enhanced Calculator</h1>
    <input type="text" id="input" placeholder="Enter expression (e.g. 2 + 2 or sqrt 16)" />
    <button onclick="calculate()">Calculate</button>
    <button onclick="squareRoot()">Square Root</button>
    <button onclick="percentage()">Percentage</button>
    <button onclick="power()">Power</button>
    <button onclick="calculateFactorial()">Factorial</button>
    <div id="result"></div>
</body>
</html>
