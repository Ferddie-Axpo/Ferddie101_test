<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fafafa; }
        .calculator { width: 210px; margin: 80px auto; }
        .screen { width: 100%; height: 42px; background: #eaeaea; text-align: right; padding: 8px 10px; font-size: 22px; font-family: 'Courier New', Courier, monospace; box-sizing: border-box; margin-bottom: 8px; border-radius: 6px; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .button { width: 100%; height: 42px; border: 1px solid #ccc; border-radius: 6px; background: white; font-size: 17px; cursor: pointer; transition: background 0.18s ease, transform 0.12s ease, border-color 0.18s ease; }
        .button:hover { background: #f5f5f5; border-color: #bbb; }
        .button:active { transform: translateY(1px); background: #ececec; }
        .button.operation { background: #1d4ed8; color: white; border-color: #1d4ed8; }
        .button.operation:hover { background: #1e40af; }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="screen" id="screen">0</div>
        <div class="buttons">
            <button class="button" onclick="appendToScreen('1')">1</button>
            <button class="button" onclick="appendToScreen('2')">2</button>
            <button class="button" onclick="appendToScreen('3')">3</button>
            <button class="button operation" onclick="appendToScreen('+')">+</button>
            <button class="button" onclick="appendToScreen('4')">4</button>
            <button class="button" onclick="appendToScreen('5')">5</button>
            <button class="button" onclick="appendToScreen('6')">6</button>
            <button class="button operation" onclick="appendToScreen('-')">-</button>
            <button class="button" onclick="appendToScreen('7')">7</button>
            <button class="button" onclick="appendToScreen('8')">8</button>
            <button class="button" onclick="appendToScreen('9')">9</button>
            <button class="button operation" onclick="appendToScreen('*')">*</button>
            <button class="button" onclick="clearScreen()">C</button>
            <button class="button" onclick="appendToScreen('0')">0</button>
            <button class="button" onclick="calculateResult()">=</button>
            <button class="button operation" onclick="appendToScreen('/')">/</button>
        </div>
    </div>
    <script>
        function appendToScreen(value) {
            var screen = document.getElementById('screen');
            if (screen.innerHTML === '0') {
                screen.innerHTML = '';
            }
            screen.innerHTML += value;
        }
        function clearScreen() {
            document.getElementById('screen').innerHTML = '0';
        }
        function calculateResult() {
            var screen = document.getElementById('screen');
            screen.innerHTML = eval(screen.innerHTML);
        }
    </script>
</body>
</html>
